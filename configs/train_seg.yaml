# =============================================================================
# Training configuration — UNet++ damage segmentation (Phase 3)
# All paths from configs/paths.yaml; nothing hardcoded here.
# =============================================================================

# ── model ─────────────────────────────────────────────────────────────────────
model:
  encoder: efficientnet-b4
  encoder_weights: imagenet
  in_channels: 6                 # 3 pre + 3 post
  num_classes: 5                 # 0=bg, 1=no-damage … 4=destroyed
  decoder_attention: scse        # squeeze-excite in decoder blocks

# ── data ──────────────────────────────────────────────────────────────────────
data:
  train_tile_size: 512           # random crop at train time
  val_tile_size: 512             # tile size for sliding-window inference
  val_tile_overlap: 128          # overlap for Gaussian blending
  include_tier3: true
  num_workers: 8
  pin_memory: true

# ── class weights (pixel-frequency estimate; recompute with scan script) ──────
# bg pixels dominate — down-weight heavily; damage classes up-weighted.
class_weights: [0.1, 0.6, 1.4, 1.8, 2.2]

# ── loss ──────────────────────────────────────────────────────────────────────
loss:
  dice_weight: 0.5
  ce_weight: 0.5

# ── optimiser ─────────────────────────────────────────────────────────────────
optimizer:
  name: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]

# ── lr scheduler ──────────────────────────────────────────────────────────────
scheduler:
  name: cosine_with_warmup
  warmup_epochs: 3
  min_lr: 1.0e-6

# ── training loop ─────────────────────────────────────────────────────────────
trainer:
  max_epochs: 60
  batch_size: 4                  # per GPU on L4 24 GB fp16; effective = 4 × accum 4 = 16
  precision: "16-mixed"
  gradient_clip_val: 1.0
  accumulate_grad_batches: 4
  val_check_interval: 1.0
  log_every_n_steps: 20

# ── checkpointing ─────────────────────────────────────────────────────────────
checkpoint:
  every_n_epochs: 5
  save_top_k: 3
  monitor: val_iou_macro
  mode: max
  filename: "unetpp-epoch{epoch:03d}-iou{val_iou_macro:.4f}"

# ── logging ───────────────────────────────────────────────────────────────────
wandb:
  project: conflict-damage-monitor
  entity: null
  tags: [unetpp, efficientnet-b4, xbd, phase3]
  log_model: false
