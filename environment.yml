name: cdm
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch>=2.0
  - torchvision
  - pytorch-cuda=11.8
  - cudatoolkit=11.8
  - pip
  - pip:
    - pytorch-lightning>=2.6.1
    - torchmetrics>=1.9.0
    - segmentation-models-pytorch==0.3.3
    - timm==0.9.2
    - rasterio>=1.3
    - gdal
    - geopandas
    - shapely
    - wandb
    - pyyaml
    - python-dotenv
    - tqdm
    - numpy
    - fastapi>=0.115.0
    - uvicorn[standard]
    - starlette>=0.41.0
    - python-multipart
    - sqlalchemy
    - geoalchemy2
    - psycopg2-binary
