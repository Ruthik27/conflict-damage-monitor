version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: cdm
      POSTGRES_PASSWORD: cdm_secret
      POSTGRES_DB: cdm
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdm"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cdm:cdm_secret@db:5432/cdm
      CHECKPOINT_SEG: /checkpoints/best_seg.ckpt
      CONFIG_SEG: /app/configs/train_seg.yaml
      PATHS_CFG: /app/configs/paths.yaml
      DEVICE: cpu
    volumes:
      - /blue/smin.fgcu/rkale.fgcu/cdm/checkpoints:/checkpoints:ro
      - /blue/smin.fgcu/rkale.fgcu/cdm/data:/data:ro
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
